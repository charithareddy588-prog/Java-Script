    <!--Shopping Cart Styles-->
    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            margin:20px;
        }

        h1{
            text-align:center;
        }

        #cartCount{
            position:fixed;
            top:20px;
            right:20px;
            background:black;
            color:white;
            padding:10px;
            border-radius:5px;
        }

        #products{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            justify-content:center;
        }

        .card{
            width:220px;
            background:white;
            padding:15px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 5px gray;
        }

        .card img{
            width:150px;
            height:150px;
            object-fit:contain;
        }

        button{
            padding:10px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }
        table{
            width:80%;
            margin:30px auto;
            border-collapse:collapse;
        }

        table,th,td{
            border:1px solid gray;
        }

        th,td{
            padding:10px;
            text-align:center;
        }

    </style>
</head>
<body>
